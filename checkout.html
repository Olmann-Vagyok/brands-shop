<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>გადახდა — BRAND S</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1B3A6B;--blue-dk:#122850;--blue-lt:#2A5298;
  --yellow:#F9A800;--yellow-dk:#D48E00;--orange:#C44A1A;
  --white:#fff;--bg:#F4F6FA;--border:#DDE3EE;
  --text:#1B2D52;--mid:#4A5568;--light:#8A94A6;
  --red:#E03131;--green:#2B7A3A;
  --shadow:0 4px 20px rgba(27,58,107,.12);--r:10px;--t:.2s ease;
}
body{font-family:'Noto Sans Georgian','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;font-family:inherit}
img{display:block;object-fit:contain}

/* TOPBAR */
.topbar{background:var(--blue-dk);color:rgba(255,255,255,.7);font-size:12px;padding:7px 0;text-align:center}
.topbar strong{color:var(--yellow)}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);box-shadow:0 2px 10px rgba(27,58,107,.07)}
.hi{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:66px}
.logo-w{display:flex;align-items:center;gap:10px}
.logo-w img{height:42px;width:auto}
.logo-t .bn{font-size:15px;font-weight:800;color:var(--blue);letter-spacing:2px}
.logo-t .bn span{color:var(--yellow)}
.logo-t .tg{font-size:9px;color:var(--light);letter-spacing:1.5px;text-transform:uppercase}
.back-link{font-size:13px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:6px;padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;transition:all var(--t)}
.back-link:hover{background:var(--blue);color:#fff;border-color:var(--blue)}

/* STEPS */
.steps{max-width:1100px;margin:0 auto;padding:20px 24px 0;display:flex;align-items:center;gap:8px;justify-content:center}
.step{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--light)}
.step.on{color:var(--blue)}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--border);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.step.on .step-num{background:var(--blue)}
.step.done .step-num{background:var(--green)}
.step-line{width:40px;height:2px;background:var(--border)}

/* LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:28px 24px 60px;display:grid;grid-template-columns:1fr 380px;gap:28px;align-items:start}
.col-main{display:flex;flex-direction:column;gap:20px}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-h{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-h h3{font-size:16px;font-weight:800}
.card-h .num{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.card-b{padding:22px}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{margin-bottom:0}
.field.full{grid-column:1/-1}
.field label{display:block;font-size:12px;font-weight:700;color:var(--mid);margin-bottom:6px}
.field label .req{color:var(--red)}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color var(--t)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--yellow)}
.field input.err{border-color:var(--red)}
.field textarea{resize:vertical;min-height:72px}

/* PAYMENT/DELIVERY OPTIONS */
.opt{display:flex;align-items:center;gap:14px;padding:15px 16px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all var(--t);margin-bottom:10px}
.opt:hover{border-color:var(--blue-lt)}
.opt.on{border-color:var(--blue);background:rgba(27,58,107,.03)}
.opt-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;position:relative;transition:all var(--t)}
.opt.on .opt-radio{border-color:var(--blue)}
.opt.on .opt-radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--blue)}
.opt-ico{font-size:22px}
.opt-txt{flex:1}
.opt-txt h4{font-size:14px;font-weight:700;margin-bottom:2px}
.opt-txt p{font-size:12px;color:var(--light)}
.opt-tag{font-size:11px;font-weight:700;color:var(--green);background:rgba(43,122,58,.1);padding:3px 8px;border-radius:20px}

/* SUMMARY */
.summary{position:sticky;top:20px}
.sum-items{max-height:320px;overflow-y:auto;padding:6px 22px}
.sum-item{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.sum-item:last-child{border-bottom:none}
.sum-img{width:56px;height:56px;border-radius:8px;background:var(--bg);flex-shrink:0;overflow:hidden;position:relative}
.sum-img img{width:100%;height:100%;object-fit:contain;padding:5px}
.sum-qty-badge{position:absolute;top:-6px;right:-6px;background:var(--blue);color:#fff;font-size:11px;font-weight:800;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.sum-info{flex:1;min-width:0}
.sum-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:3px}
.sum-sku{font-size:11px;color:var(--light)}
.sum-price{font-size:14px;font-weight:800;color:var(--blue);white-space:nowrap}
.sum-totals{padding:18px 22px;border-top:1px solid var(--border)}
.sum-row{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;margin-bottom:10px;color:var(--mid)}
.sum-row.grand{font-size:18px;font-weight:800;color:var(--text);margin-top:6px;padding-top:14px;border-top:1px solid var(--border);margin-bottom:0}
.sum-row.grand .val{color:var(--blue)}
.free-tag{color:var(--green);font-weight:700}
.promo-row{display:flex;gap:8px;padding:0 22px 18px}
.promo-row input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.promo-row button{padding:10px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--mid);transition:all var(--t)}
.promo-row button:hover{border-color:var(--blue);color:var(--blue)}

/* PLACE ORDER */
.btn-place{display:block;width:100%;padding:15px;background:var(--blue);color:#fff;font-size:15px;font-weight:800;border-radius:10px;transition:all var(--t)}
.btn-place:hover{background:var(--yellow);color:var(--blue-dk)}
.btn-place:disabled{opacity:.5;cursor:not-allowed}
.secure-note{text-align:center;font-size:11.5px;color:var(--light);margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px}

/* EMPTY */
.empty{max-width:480px;margin:80px auto;text-align:center;padding:0 24px}
.empty .ei{font-size:64px;margin-bottom:18px}
.empty h2{font-size:24px;font-weight:800;margin-bottom:10px}
.empty p{font-size:14px;color:var(--light);margin-bottom:24px}
.btn-shop{display:inline-block;padding:13px 32px;background:var(--blue);color:#fff;border-radius:40px;font-weight:700;transition:all var(--t)}
.btn-shop:hover{background:var(--yellow);color:var(--blue-dk)}

/* SUCCESS */
.success{max-width:520px;margin:60px auto;text-align:center;padding:40px 24px}
.success .si{width:90px;height:90px;border-radius:50%;background:rgba(43,122,58,.1);display:flex;align-items:center;justify-content:center;font-size:46px;margin:0 auto 24px}
.success h2{font-size:26px;font-weight:800;margin-bottom:12px}
.success p{font-size:14px;color:var(--mid);line-height:1.7;margin-bottom:8px}
.order-id{display:inline-block;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 24px;font-size:16px;font-weight:800;color:var(--blue);margin:16px 0 28px;font-family:monospace}
.success-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--blue-dk);color:#fff;padding:11px 22px;border-radius:40px;font-size:13.5px;font-weight:500;z-index:3000;opacity:0;pointer-events:none;transition:all .28s ease;white-space:nowrap;border-left:4px solid var(--yellow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{background:#0F1F3D;color:rgba(255,255,255,.4);text-align:center;padding:18px;font-size:12px}

@media(max-width:900px){.wrap{grid-template-columns:1fr}.summary{position:static}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">🔒 <strong>უსაფრთხო გადახდა</strong> &nbsp;·&nbsp; 🚚 <strong>₾50+</strong> შეკვეთებზე უფასო მიტანა</div>

<header class="header">
  <div class="hi">
    <a href="index.html" class="logo-w">
      <img src="images/logo.svg" alt="BRAND S">
      <div class="logo-t"><div class="bn">BRAND <span>S</span></div><div class="tg">ელექტრო პროდუქტები</div></div>
    </a>
    <a href="index.html" class="back-link">← მაღაზია</a>
  </div>
</header>

<!-- STEPS -->
<div class="steps" id="steps">
  <div class="step on"><span class="step-num">1</span> კალათა</div>
  <div class="step-line"></div>
  <div class="step on"><span class="step-num">2</span> მონაცემები</div>
  <div class="step-line"></div>
  <div class="step"><span class="step-num">3</span> დასრულება</div>
</div>

<!-- MAIN CONTENT -->
<div id="content"></div>

<footer>© 2025 BRAND S · ყველა უფლება დაცულია</footer>
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/auth.js"></script>

<!-- EmailJS (free order notifications) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
// ── IMAGES ────────────────────────────────────────────────────
const IMGS={
  breaker:'images/products/breaker.png', connector:'images/products/connector.png',
  socket:'images/products/socket.png',   switch:'images/products/switch.png',
  cable:'images/products/cable.png',      panel:'images/products/panel.png',
  extension:'images/products/extension.png',
};
function imgFor(it){return IMGS[it.t]||IMGS.breaker}

// ── CART ──────────────────────────────────────────────────────
function loadCart(){try{return JSON.parse(localStorage.getItem('brands_cart'))||[]}catch(e){return[]}}
function saveCart(c){localStorage.setItem('brands_cart',JSON.stringify(c))}
let cart = loadCart();

const FREE_OVER = 50;       // free delivery threshold (₾)
const DELIVERY  = 5;        // delivery fee below threshold (₾)
let payMethod = 'cod';      // 'cod' = cash on delivery, 'card' = bank card

function subtotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0)}
function deliveryFee(){return subtotal()>=FREE_OVER?0:DELIVERY}
function grandTotal(){return subtotal()+deliveryFee()}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const content = document.getElementById('content');

  if(!cart.length){
    document.getElementById('steps').style.display='none';
    content.innerHTML = `<div class="empty">
      <div class="ei">🛒</div>
      <h2>კალათა ცარიელია</h2>
      <p>დაამატეთ პროდუქტები კატალოგიდან გადახდის გასაგრძელებლად</p>
      <a href="index.html" class="btn-shop">← მაღაზიაში დაბრუნება</a>
    </div>`;
    return;
  }

  content.innerHTML = `
  <div class="wrap">
    <!-- LEFT: forms -->
    <div class="col-main">

      <!-- CONTACT -->
      <div class="card">
        <div class="card-h"><span class="num">1</span><h3>საკონტაქტო ინფორმაცია</h3></div>
        <div class="card-b">
          <div class="form-grid">
            <div class="field"><label>სახელი <span class="req">*</span></label><input type="text" id="f-fname" placeholder="ირაკლი"></div>
            <div class="field"><label>გვარი <span class="req">*</span></label><input type="text" id="f-lname" placeholder="ბერიძე"></div>
            <div class="field"><label>ტელეფონი <span class="req">*</span></label><input type="tel" id="f-phone" placeholder="555 12 34 56"></div>
            <div class="field"><label>ელ-ფოსტა <span class="req">*</span></label><input type="email" id="f-email" placeholder="you@example.com"></div>
          </div>
        </div>
      </div>

      <!-- DELIVERY -->
      <div class="card">
        <div class="card-h"><span class="num">2</span><h3>მიტანის მისამართი</h3></div>
        <div class="card-b">
          <div class="form-grid">
            <div class="field full"><label>ქალაქი <span class="req">*</span></label>
              <select id="f-city">
                <option>თბილისი</option><option>ბათუმი</option><option>ქუთაისი</option>
                <option>რუსთავი</option><option>გორი</option><option>ზუგდიდი</option>
                <option>ფოთი</option><option>თელავი</option><option>სხვა</option>
              </select>
            </div>
            <div class="field full"><label>მისამართი <span class="req">*</span></label><input type="text" id="f-addr" placeholder="ი. ჭავჭავაძის გამზ. 10, ბ. 5"></div>
            <div class="field full"><label>კომენტარი (სურვ.)</label><textarea id="f-note" placeholder="დამატებითი ინსტრუქცია კურიერისთვის..."></textarea></div>
          </div>
        </div>
      </div>

      <!-- PAYMENT -->
      <div class="card">
        <div class="card-h"><span class="num">3</span><h3>გადახდის მეთოდი</h3></div>
        <div class="card-b">
          <div class="opt on" id="opt-cod" onclick="setPay('cod')">
            <div class="opt-radio"></div>
            <div class="opt-ico">💵</div>
            <div class="opt-txt"><h4>ნაღდი ანგარიშსწორება</h4><p>გადაიხადეთ კურიერთან მიღებისას</p></div>
          </div>
          <div class="opt" id="opt-card" onclick="setPay('card')">
            <div class="opt-radio"></div>
            <div class="opt-ico">💳</div>
            <div class="opt-txt"><h4>ბარათით გადახდა</h4><p>Visa · Mastercard · ბარათით ონლაინ</p></div>
            <span class="opt-tag">მალე</span>
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT: summary -->
    <div class="card summary">
      <div class="card-h"><h3>🛒 თქვენი შეკვეთა</h3></div>
      <div class="sum-items" id="sum-items"></div>
      <div class="promo-row">
        <input type="text" id="promo" placeholder="პრომო კოდი">
        <button onclick="applyPromo()">გამოყენება</button>
      </div>
      <div class="sum-totals">
        <div class="sum-row"><span>ქვეჯამი</span><span id="s-sub"></span></div>
        <div class="sum-row"><span>მიტანა</span><span id="s-del"></span></div>
        <div class="sum-row grand"><span>სულ</span><span class="val" id="s-grand"></span></div>
      </div>
      <div style="padding:0 22px 22px">
        <button class="btn-place" id="btn-place" onclick="placeOrder()">შეკვეთის გაფორმება</button>
        <div class="secure-note">🔒 თქვენი მონაცემები დაცულია</div>
      </div>
    </div>
  </div>`;

  renderSummary();
  prefillUser();
}

function renderSummary(){
  document.getElementById('sum-items').innerHTML = cart.map(it=>`
    <div class="sum-item">
      <div class="sum-img"><img src="${imgFor(it)}" alt="${it.name}"><span class="sum-qty-badge">${it.qty}</span></div>
      <div class="sum-info">
        <div class="sum-name">${it.name}</div>
        <div class="sum-sku">${it.sku||''}</div>
      </div>
      <div class="sum-price">₾${(it.price*it.qty).toFixed(2)}</div>
    </div>`).join('');

  const del = deliveryFee();
  document.getElementById('s-sub').textContent = '₾'+subtotal().toFixed(2);
  document.getElementById('s-del').innerHTML = del===0
    ? '<span class="free-tag">უფასო</span>'
    : '₾'+del.toFixed(2);
  document.getElementById('s-grand').textContent = '₾'+grandTotal().toFixed(2);
}

// ── PAYMENT SELECT ────────────────────────────────────────────
function setPay(m){
  payMethod=m;
  document.getElementById('opt-cod').classList.toggle('on',m==='cod');
  document.getElementById('opt-card').classList.toggle('on',m==='card');
  if(m==='card') showToast('ბარათით გადახდა მალე დაემატება — ამჟამად აირჩიეთ ნაღდი');
}

// ── PROMO ─────────────────────────────────────────────────────
function applyPromo(){
  const code=document.getElementById('promo').value.trim().toUpperCase();
  if(code==='BRANDS10') showToast('✅ კოდი მიღებულია (დემო)');
  else showToast('⚠️ პრომო კოდი არ მოიძებნა');
}

// ── PREFILL FROM LOGGED-IN USER ───────────────────────────────
function prefillUser(){
  if(typeof firebase==='undefined'||!FB_CONFIGURED) return;
  firebase.auth().onAuthStateChanged(u=>{
    if(!u) return;
    if(u.email) document.getElementById('f-email').value=u.email;
    if(u.displayName){
      const parts=u.displayName.split(' ');
      document.getElementById('f-fname').value=parts[0]||'';
      document.getElementById('f-lname').value=parts.slice(1).join(' ')||'';
    }
  });
}

// ── PLACE ORDER ───────────────────────────────────────────────
function placeOrder(){
  // Validate required fields
  const required=['f-fname','f-lname','f-phone','f-email','f-addr'];
  let ok=true;
  required.forEach(id=>{
    const el=document.getElementById(id);
    if(!el.value.trim()){el.classList.add('err');ok=false;}
    else el.classList.remove('err');
  });
  if(!ok){showToast('⚠️ შეავსეთ ყველა სავალდებულო ველი');return;}

  const btn=document.getElementById('btn-place');
  btn.disabled=true; btn.textContent='მუშავდება...';

  const orderId='BS-'+Date.now().toString().slice(-8);
  const order={
    orderId,
    items: cart.map(i=>({id:i.id,name:i.name,sku:i.sku,price:i.price,qty:i.qty})),
    subtotal: subtotal(),
    delivery: deliveryFee(),
    total: grandTotal(),
    payment: payMethod,
    customer:{
      firstName: document.getElementById('f-fname').value.trim(),
      lastName:  document.getElementById('f-lname').value.trim(),
      phone:     document.getElementById('f-phone').value.trim(),
      email:     document.getElementById('f-email').value.trim(),
      city:      document.getElementById('f-city').value,
      address:   document.getElementById('f-addr').value.trim(),
      note:      document.getElementById('f-note').value.trim(),
    },
    status:'new',
    createdAt: (typeof firebase!=='undefined'&&FB_CONFIGURED)
      ? firebase.firestore.FieldValue.serverTimestamp() : new Date().toISOString(),
    uid: (typeof firebase!=='undefined'&&FB_CONFIGURED&&firebase.auth().currentUser)
      ? firebase.auth().currentUser.uid : null,
  };

  // Save to Firestore (falls back gracefully if offline)
  const finish=()=>{
    sendOrderEmail(order);     // notify store + customer (free, EmailJS)
    saveCart([]);              // clear cart
    cart=[];
    showSuccess(orderId, order);
  };

  if(typeof firebase!=='undefined'&&FB_CONFIGURED){
    firebase.firestore().collection('orders').add(order)
      .then(finish)
      .catch(err=>{
        console.log('Order save error:',err.message);
        finish(); // still show success to customer; order kept locally
      });
  } else {
    finish();
  }
}

// ── EMAIL NOTIFICATION (EmailJS — free, client-side) ──────────
// Setup: create a free account at https://emailjs.com, connect Gmail,
// make a template, then paste the 3 IDs below. Until then it no-ops.
const EMAILJS_PUBLIC_KEY  = 'PASTE_PUBLIC_KEY';
const EMAILJS_SERVICE_ID  = 'PASTE_SERVICE_ID';
const EMAILJS_TEMPLATE_ID = 'PASTE_TEMPLATE_ID';
const STORE_EMAIL         = 'iraklicqvitaria@gmail.com'; // where you receive orders

function emailConfigured(){
  return typeof emailjs!=='undefined'
    && EMAILJS_PUBLIC_KEY !== 'PASTE_PUBLIC_KEY';
}

// Initialize EmailJS once (only if you've pasted your public key)
if(emailConfigured()){
  try { emailjs.init(EMAILJS_PUBLIC_KEY); } catch(e){}
}

function sendOrderEmail(order){
  if(!emailConfigured()) return;   // skip silently until configured
  const c = order.customer;
  const itemsText = order.items
    .map(i=>`• ${i.name} (${i.sku||''}) — ${i.qty} ცალი × ₾${i.price} = ₾${(i.price*i.qty).toFixed(2)}`)
    .join('\n');

  const params = {
    order_id:      order.orderId,
    customer_name: `${c.firstName} ${c.lastName}`,
    customer_phone:c.phone,
    customer_email:c.email,
    city:          c.city,
    address:       c.address,
    note:          c.note || '—',
    payment:       order.payment==='cod' ? 'ნაღდი ანგარიშსწორება' : 'ბარათით',
    items:         itemsText,
    subtotal:      '₾'+order.subtotal.toFixed(2),
    delivery:      order.delivery===0 ? 'უფასო' : '₾'+order.delivery.toFixed(2),
    total:         '₾'+order.total.toFixed(2),
    store_email:   STORE_EMAIL,
    to_email:      STORE_EMAIL,   // store owner gets the order
    reply_to:      c.email,
  };

  try {
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
      .then(()=>console.log('Order email sent'))
      .catch(e=>console.log('Email error:', e?.text||e));
  } catch(e){ console.log('Email error:', e); }
}

// ── TOAST ─────────────────────────────────────────────────────
let _tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2800);
}

render();
