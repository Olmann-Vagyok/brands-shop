<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pg-title">პროდუქტი — BRAND S</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1B3A6B;--blue-dk:#122850;--blue-lt:#2A5298;
  --yellow:#F9A800;--yellow-dk:#D48E00;
  --orange:#C44A1A;
  --white:#fff;--bg:#F4F6FA;--border:#DDE3EE;
  --text:#1B2D52;--mid:#4A5568;--light:#8A94A6;
  --red:#E03131;--green:#2B7A3A;
  --shadow:0 4px 20px rgba(27,58,107,.12);
  --shadow-lg:0 8px 40px rgba(27,58,107,.18);
  --r:10px;--t:.22s ease;
}
body{font-family:'Noto Sans Georgian','Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}
img{display:block;object-fit:contain}
ul{list-style:none}

/* ── TOPBAR ── */
.topbar{background:var(--blue-dk);color:rgba(255,255,255,.75);font-size:12.5px;padding:8px 0;text-align:center}
.topbar strong{color:var(--yellow)}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:900;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 2px 12px rgba(27,58,107,.07)}
.hi{max-width:1400px;margin:0 auto;padding:0 28px;display:flex;align-items:center;gap:18px;height:70px}
.logo-w{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-t .bn{font-size:16px;font-weight:800;color:var(--blue);letter-spacing:2px}
.logo-t .bn span{color:var(--yellow)}
.logo-t .tg{font-size:9px;color:var(--light);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.search{flex:1;max-width:500px;display:flex;border:1.5px solid var(--border);border-radius:40px;overflow:hidden;transition:border-color var(--t)}
.search:focus-within{border-color:var(--yellow)}
.search input{flex:1;border:none;outline:none;padding:10px 18px;font-size:14px;font-family:inherit;color:var(--text)}
.search button{background:var(--yellow);color:#fff;padding:0 18px;font-size:14px;transition:background var(--t)}
.search button:hover{background:var(--yellow-dk)}
.hacts{display:flex;align-items:center;gap:2px;margin-left:auto}
.ib{position:relative;padding:9px 11px;border-radius:8px;font-size:19px;color:var(--mid);display:flex;flex-direction:column;align-items:center;gap:2px;transition:all var(--t);cursor:pointer}
.ib:hover{color:var(--blue);background:var(--bg)}
.ib .lb{font-size:10px;color:var(--light);font-weight:500}
.bdg{position:absolute;top:5px;right:5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;width:17px;height:17px;border-radius:50%;display:none;align-items:center;justify-content:center}

/* ── BREADCRUMB ── */
.bc{background:#fff;border-bottom:1px solid var(--border)}
.bci{max-width:1400px;margin:0 auto;padding:12px 28px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--light);flex-wrap:wrap}
.bci a{color:var(--light);transition:color var(--t)}
.bci a:hover{color:var(--blue)}
.bci .sep{color:var(--border)}
.bci .cur{color:var(--text);font-weight:600}

/* ── PRODUCT MAIN ── */
.pd-wrap{max-width:1400px;margin:0 auto;padding:36px 28px}
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}

/* Image side */
.pd-img-wrap{position:sticky;top:90px}
.pd-main-img{background:#fff;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:24px;margin-bottom:12px}
.pd-main-img img{width:100%;height:100%;object-fit:contain;max-height:420px}
.pd-stock-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(43,122,58,.08);border:1px solid rgba(43,122,58,.2);border-radius:8px;font-size:13px;font-weight:600;color:var(--green)}
.pd-stock-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}

/* Info side */
.pd-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:14px}
.b-hot{background:var(--orange);color:#fff}
.b-sale{background:var(--red);color:#fff}
.b-new{background:var(--blue);color:#fff}
.b-promo{background:var(--yellow);color:var(--blue-dk)}

.pd-name{font-size:26px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:14px}
.pd-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.pd-sku{font-size:12px;color:var(--light);background:var(--bg);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-family:monospace}
.pd-brand{font-size:12px;font-weight:700;color:var(--blue);background:rgba(27,58,107,.07);padding:4px 10px;border-radius:6px}
.pd-rating{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.stars{color:var(--yellow);font-size:14px;letter-spacing:1px}
.rv{font-size:13px;color:var(--light)}

.pd-price-box{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:22px}
.pd-price-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pd-price-now{font-size:36px;font-weight:800;color:var(--blue)}
.pd-price-old{font-size:18px;color:var(--light);text-decoration:line-through}
.pd-price-off{font-size:13px;font-weight:700;color:var(--red);background:rgba(224,49,49,.1);padding:4px 10px;border-radius:6px}
.pd-vat{font-size:11px;color:var(--light);margin-top:8px}

/* Qty + cart */
.pd-qty-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.qty-ctrl{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.qty-ctrl button{width:40px;height:44px;font-size:18px;font-weight:700;color:var(--text);transition:all var(--t);background:#fff}
.qty-ctrl button:hover{background:var(--blue);color:#fff}
.qty-ctrl input{width:52px;height:44px;border:none;outline:none;text-align:center;font-size:16px;font-weight:700;font-family:inherit;color:var(--text)}
.btn-add-big{flex:1;padding:13px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;border-radius:10px;transition:all var(--t)}
.btn-add-big:hover{background:var(--yellow);color:var(--blue-dk)}
.btn-wish-big{width:48px;height:48px;border:1.5px solid var(--border);border-radius:10px;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.btn-wish-big:hover,.btn-wish-big.on{border-color:var(--red);color:var(--red)}

/* Delivery cards */
.del-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.del-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.del-ico{font-size:20px;flex-shrink:0}
.del-card h5{font-size:12.5px;font-weight:700;margin-bottom:3px}
.del-card p{font-size:11.5px;color:var(--light)}

/* ── TABS ── */
.tabs-wrap{max-width:1400px;margin:0 auto;padding:0 28px 52px}
.tabs-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:28px}
.tab{padding:13px 22px;font-size:14px;font-weight:600;color:var(--light);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--t)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}
.tab-pane.on{display:block}

/* Spec table */
.spec-tbl{width:100%;border-collapse:collapse}
.spec-tbl tr:nth-child(odd) td{background:var(--bg)}
.spec-tbl td{padding:11px 16px;font-size:13.5px;border-bottom:1px solid var(--border)}
.spec-tbl td:first-child{font-weight:700;color:var(--text);width:40%;white-space:nowrap}
.spec-tbl td:last-child{color:var(--mid)}

/* Description */
.desc-txt{font-size:14px;line-height:1.8;color:var(--mid);max-width:720px}
.desc-txt h4{font-size:16px;font-weight:700;color:var(--text);margin:20px 0 10px}
.desc-txt ul{list-style:disc;padding-left:20px}
.desc-txt ul li{margin-bottom:6px}

/* Reviews */
.reviews-list{display:flex;flex-direction:column;gap:16px;max-width:720px}
.rv-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px}
.rv-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rv-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-lt));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0}
.rv-author{font-size:13.5px;font-weight:700}
.rv-date{font-size:11px;color:var(--light)}
.rv-stars{color:var(--yellow);font-size:12px}
.rv-txt{font-size:13.5px;color:var(--mid);line-height:1.6}

/* ── RELATED ── */
.rel-wrap{background:#fff;border-top:1px solid var(--border);padding:52px 0}
.rel-inner{max-width:1400px;margin:0 auto;padding:0 28px}
.sec-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px}
.sec-title{font-size:22px;font-weight:800}
.sec-title span{color:var(--yellow)}
.see{font-size:13px;font-weight:600;color:var(--blue);padding:7px 16px;border:1.5px solid var(--blue);border-radius:40px;transition:all var(--t)}
.see:hover{background:var(--blue);color:#fff}
.pgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.pc{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all var(--t)}
.pc:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:transparent}
.pimg-lnk{display:block}
.pimg{position:relative;height:180px;overflow:hidden;background:linear-gradient(135deg,#EBF0FA,#F4F6FA)}
.pimg img{width:100%;height:100%;object-fit:contain;padding:14px;transition:transform .4s ease}
.pc:hover .pimg img{transform:scale(1.06)}
.pbadge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.b-new-c{background:var(--blue);color:#fff}
.b-sale-c{background:var(--red);color:#fff}
.b-hot-c{background:var(--orange);color:#fff}
.b-promo-c{background:var(--yellow);color:var(--blue-dk)}
.pb{padding:13px 14px 15px}
.pcat{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.pname{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:8px}
.pname-lnk{text-decoration:none;color:inherit}
.pname-lnk:hover .pname{color:var(--blue)}
.pprice{display:flex;align-items:center;gap:7px}
.pnow{font-size:17px;font-weight:800;color:var(--blue)}
.pold{font-size:12px;color:var(--light);text-decoration:line-through}
.poff{font-size:10px;font-weight:700;color:var(--red);background:rgba(224,49,49,.08);padding:2px 5px;border-radius:4px}
.btn-add-sm{display:block;width:100%;margin-top:10px;padding:9px;background:var(--blue);color:#fff;font-size:12px;font-weight:700;border-radius:8px;transition:all var(--t)}
.btn-add-sm:hover{background:var(--yellow);color:var(--blue-dk)}

/* ── CART ── */
.overlay{position:fixed;inset:0;background:rgba(11,22,47,.55);z-index:1900;opacity:0;visibility:hidden;transition:all var(--t)}
.overlay.open{opacity:1;visibility:visible}
.cs{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:#fff;z-index:1901;display:flex;flex-direction:column;transition:right .32s ease;box-shadow:-4px 0 30px rgba(0,0,0,.15)}
.cs.open{right:0}
.csh{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.csh h3{font-size:16px;font-weight:800}
.csx{font-size:20px;color:var(--light);cursor:pointer;padding:4px;transition:color var(--t)}
.csx:hover{color:var(--text)}
.cslist{flex:1;overflow-y:auto;padding:10px 22px}
.csi{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.csi-img{width:64px;height:64px;border-radius:8px;background:var(--bg);flex-shrink:0;overflow:hidden}
.csi-img img{width:100%;height:100%;object-fit:contain;padding:5px}
.csi-inf{flex:1}
.csi-n{font-size:12.5px;font-weight:600;margin-bottom:3px}
.csi-p{font-size:14px;font-weight:800;color:var(--blue)}
.csi-q{display:flex;align-items:center;gap:8px;margin-top:7px}
.qb{width:25px;height:25px;border:1.5px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all var(--t)}
.qb:hover{border-color:var(--blue);color:var(--blue)}
.qv{font-size:13px;font-weight:700;min-width:18px;text-align:center}
.csi-rm{font-size:16px;color:var(--light);cursor:pointer;align-self:flex-start;transition:color var(--t)}
.csi-rm:hover{color:var(--red)}
.cs-empty{text-align:center;padding:55px 20px;color:var(--light)}
.cs-empty .ei{font-size:48px;margin-bottom:12px}
.csf{padding:16px 22px;border-top:1px solid var(--border)}
.cst{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.cst span{font-size:14px;font-weight:600;color:var(--mid)}
.cst strong{font-size:21px;font-weight:800;color:var(--blue)}
.btn-co{display:block;width:100%;padding:13px;text-align:center;background:var(--blue);color:#fff;font-size:14px;font-weight:700;border-radius:10px;transition:background var(--t);border:none;cursor:pointer;font-family:inherit}
.btn-co:hover{background:var(--yellow);color:var(--blue-dk)}

/* ── FOOTER ── */
.footer{background:#0F1F3D;color:rgba(255,255,255,.65);padding:52px 0 0}
.fi{max-width:1400px;margin:0 auto;padding:0 28px 44px;display:grid;grid-template-columns:2fr 1fr 1fr 1.3fr;gap:38px}
.fbrand p{font-size:13px;line-height:1.75;margin-bottom:18px}
.soc{display:flex;gap:9px}
.sc{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all var(--t);color:rgba(255,255,255,.55)}
.sc:hover{border-color:var(--yellow);color:var(--yellow)}
.fc h4{font-size:11px;font-weight:700;color:#fff;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.fc ul li{margin-bottom:8px}
.fc ul li a{font-size:13px;color:rgba(255,255,255,.5);transition:color var(--t)}
.fc ul li a:hover{color:var(--yellow)}
.cline{display:flex;align-items:flex-start;gap:9px;margin-bottom:11px}
.cico{font-size:14px;flex-shrink:0;margin-top:1px}
.ctxt{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5}
.fbot{border-top:1px solid rgba(255,255,255,.08);padding:18px 28px;max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.3)}

/* ── TOAST ── */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--blue-dk);color:#fff;padding:11px 22px;border-radius:40px;font-size:13.5px;font-weight:500;z-index:3000;opacity:0;pointer-events:none;transition:all .28s ease;white-space:nowrap;border-left:4px solid var(--yellow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .hl{color:var(--yellow);font-weight:700}

/* ── NOT FOUND ── */
.nf{max-width:500px;margin:80px auto;text-align:center;padding:0 28px}
.nf h2{font-size:28px;font-weight:800;margin-bottom:12px}
.nf p{color:var(--light);margin-bottom:24px}
.btn-back{display:inline-block;padding:12px 28px;background:var(--blue);color:#fff;border-radius:40px;font-weight:700;transition:background var(--t)}
.btn-back:hover{background:var(--yellow);color:var(--blue-dk)}

@media(max-width:900px){.pd-grid{grid-template-columns:1fr}.pd-img-wrap{position:static}.del-cards{grid-template-columns:1fr}.pgrid{grid-template-columns:repeat(2,1fr)}.fi{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.hi{height:62px}.search{display:none}.pd-wrap{padding:20px 16px}.pd-name{font-size:20px}.pd-price-now{font-size:28px}.tabs-wrap{padding:0 16px 36px}.pgrid{grid-template-columns:repeat(2,1fr)}.fi{grid-template-columns:1fr}.cs{width:100%;right:-100%}}
</style>
</head>
<body>

<div class="topbar">🚚 <strong>₾50-ზე მეტი</strong> შეკვეთებისთვის — <strong>უფასო მიტანა!</strong> &nbsp;·&nbsp; 📞 <strong>+995 555 000 000</strong></div>

<header class="header">
  <div class="hi">
    <a href="index.html" class="logo-w">
      <svg width="44" height="44" viewBox="0 0 100 100" fill="none">
        <path d="M72 22C72 22 72 10 58 10C44 10 28 10 28 26C28 42 44 44 58 44C70 44 70 56 58 56C46 56 28 56 28 56" stroke="#1B3A6B" stroke-width="16" stroke-linecap="round"/>
        <path d="M28 56C28 56 28 68 42 68C56 68 72 68 72 74C72 80 72 90 58 90C44 90 28 90 28 78" stroke="#F9A800" stroke-width="16" stroke-linecap="round"/>
        <line x1="14" y1="14" x2="22" y2="14" stroke="#C44A1A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="12" y1="20" x2="22" y2="20" stroke="#C44A1A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="14" y1="26" x2="22" y2="26" stroke="#C44A1A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="78" y1="74" x2="86" y2="74" stroke="#C44A1A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="78" y1="80" x2="88" y2="80" stroke="#C44A1A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="78" y1="86" x2="86" y2="86" stroke="#C44A1A" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <div class="logo-t"><div class="bn">BRAND <span>S</span></div><div class="tg">ელექტრო პროდუქტები</div></div>
    </a>
    <div class="search">
      <input type="text" placeholder="მოძებნე პროდუქტი...">
      <button>🔍</button>
    </div>
    <div class="hacts">
      <div class="ib">👤<span class="lb">ანგარიში</span></div>
      <div class="ib">🤍<span class="lb">რჩეულები</span></div>
      <div class="ib" id="cbtn">🛒<span id="cbdg" class="bdg">0</span><span class="lb">კალათა</span></div>
    </div>
  </div>
</header>

<div class="bc"><div class="bci" id="breadcrumb"></div></div>

<div id="main-content"></div>

<!-- CART -->
<div class="overlay" id="ov"></div>
<div class="cs" id="csd">
  <div class="csh"><h3>🛒 კალათა</h3><span class="csx" id="cscl">✕</span></div>
  <div class="cslist" id="cslist"></div>
  <div class="csf" id="csf" style="display:none">
    <div class="cst"><span>სულ:</span><strong id="cstotal">₾0</strong></div>
    <button class="btn-co">შეძენის გაგრძელება →</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── IMAGES ────────────────────────────────────────────────────
const PH='data:image/svg+xml;base64,'+btoa('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect width="400" height="400" fill="#EBF0FA"/></svg>');
const IMGS={breaker:PH,connector:PH,socket:PH,switch:PH,cable:PH,panel:PH,extension:PH};
const PIMG={};
function img(p){return PIMG[p.id]||IMGS[p.t]||PH}

// ── ALL 100 PRODUCTS ──────────────────────────────────────────
const P=[

// ── STATE ─────────────────────────────────────────────────────
let cart=[], wish=new Set(), qty=1;

// ── CART ─────────────────────────────────────────────────────
function addCart(id,q){
  q=q||1;
  const p=P.find(x=>x.id===id); if(!p)return;
  const ex=cart.find(i=>i.id===id);
  ex?ex.qty+=q:cart.push({...p,qty:q});
  updateCart();
  showToast(`<span class="hl">${p.name}</span> კალათაში დაემატა!`);
  openCart();
}
function rmCart(id){cart=cart.filter(i=>i.id!==id);updateCart()}
function chQty(id,d){const it=cart.find(i=>i.id===id);if(!it)return;it.qty+=d;it.qty<=0?rmCart(id):updateCart()}
function updateCart(){
  const tot=cart.reduce((s,i)=>s+i.qty,0);
  const totP=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const bdg=document.getElementById('cbdg');
  bdg.textContent=tot; bdg.style.display=tot?'flex':'none';
  const list=document.getElementById('cslist');
  const foot=document.getElementById('csf');
  if(!cart.length){
    list.innerHTML='<div class="cs-empty"><div class="ei">🛒</div><p>კალათა ცარიელია</p></div>';
    foot.style.display='none'; return;
  }
  foot.style.display='block';
  document.getElementById('cstotal').textContent=`₾${totP.toFixed(2)}`;
  list.innerHTML=cart.map(it=>`<div class="csi">
    <div class="csi-img"><img src="${img(it)}" alt="${it.name}"></div>
    <div class="csi-inf">
      <div class="csi-n">${it.name}</div>
      <div class="csi-p">₾${(it.price*it.qty).toFixed(2)}</div>
      <div class="csi-q">
        <div class="qb" onclick="chQty(${it.id},-1)">−</div>
        <span class="qv">${it.qty}</span>
        <div class="qb" onclick="chQty(${it.id},1)">+</div>
      </div>
    </div>
    <span class="csi-rm" onclick="rmCart(${it.id})">✕</span>
  </div>`).join('');
}
function openCart(){document.getElementById('csd').classList.add('open');document.getElementById('ov').classList.add('open');document.body.style.overflow='hidden'}
function closeCart(){document.getElementById('csd').classList.remove('open');document.getElementById('ov').classList.remove('open');document.body.style.overflow=''}

// ── SPECS from product data ────────────────────────────────────
function getSpecs(p){
  const s={};
  if(p.cat==='ავტ. ამომრთველი'){
    const poles=p.name.includes('2პ')?'2':p.name.includes('3პ')?'3':'1';
    const amp=(p.name.match(/(\d+)ა/)||[])[1];
    s['პოლუსები']=poles;
    if(amp)s['ნომინ. დენი']=amp+' A';
    s['გათიშვის უნარი']='6 kA';
    s['სტანდარტი']='IEC/EN 60898-1';
    s['სამონტაჟო']='DIN-ლიანდაგი 35მმ';
    s['სამუშ. ძაბვა']='230/400 V';
    s['სიხშირე']='50/60 Hz';
    if(p.name.includes('RCD')||p.name.includes('CDA')){
      s['გამოყენება']='დიფ. ამომრთველი (RCD)';
      s['სენსიტ.']='30 mA';
    }
  } else if(p.cat==='კონექტორები'){
    if(p.brand==='WAGO'){
      s['ტიპი']='Push-in კავშირი';
      s['სამუშ. ძაბვა']='400 V';
      s['მაქს. ტოკი']='32 A';
      const w=(p.name.match(/(\d+)-სადენი/)||[])[1];
      if(w)s['სადენების რ-ბა']=w;
      const cs=(p.name.match(/(\d+\.?\d*)მმ²/)||[])[1];
      s['განაკვეთი']=(cs||'0.14–4')+' მმ²';
    } else {
      s['ტიპი']='სჭანჭრიანი კლემა';
      s['მასალა']='პოლიამიდი + სპილენძი';
    }
    s['ტემპ. დიაპ.']='-40…+85 °C';
  } else if(p.cat==='როზეტები & ჩამრთველები'){
    s['ტიპი']=p.t==='socket'?'სოკეტი (Schuko)':'ჩამრთველი';
    s['სამუშ. ძაბვა']='250 V';
    s['მაქს. ტოკი']='16 A';
    s['დამონტ. ტიპი']='ჩასაშენებელი';
    s['დაცვა']='IP20';
    if(p.name.includes('USB'))s['USB']='Type A + Type C';
    if(p.name.includes('ჩამქრობი'))s['სიმძლავრე']='40–400 W';
  } else if(p.cat==='სადენები'){
    const cs=(p.name.match(/(\d+×\d+\.?\d*)/)||[])[1];
    if(cs)s['განაკვეთი']=cs+' მმ²';
    s['გამტარი']='სპილენძი';
    s['გარსი']=p.name.includes('უჰალოგენო')?'LSOH (უჰალოგენო)':p.name.includes('რეტრო')?'ქსოვილი+PVC':'PVC';
    s['სამუშ. ძაბვა']='0.6/1 kV';
    s['ტემპ.']='-25…+70 °C';
    if(p.name.includes('Cat'))s['კატეგ.']='Cat5e / Cat6e';
    if(p.name.includes('100მ'))s['სიგრძე']='100 მ / რულონი';
    if(p.name.includes('305მ'))s['სიგრძე']='305 მ / კოლოფი';
  } else if(p.cat==='განაწ. ფარები'){
    const mod=(p.name.match(/(\d+)-მოდ/)||[])[1];
    if(mod)s['მოდულები']=mod;
    s['ტიპი']=p.name.includes('ზედაპ.')?'ზედაპირული':p.name.includes('ჩასაშ.')?'ჩასაშენებელი':'კარადა';
    s['მასალა']=p.name.includes('ლითონ')?'ლითო':'პლასტმასი';
    s['დაცვა']='IP40';
    if(p.name.includes('×'))s['განზომ.']=p.name.replace(/.*კარადა\s+/,'').replace(/[^0-9×]/g,'')+'მმ';
  } else if(p.cat==='დამაგრძელებელები'){
    const outlets=(p.name.match(/(\d+)-სოკ/)||[])[1];
    const len=(p.name.match(/(\d+)მ/)||[])[1];
    if(outlets)s['სოკეტები']=outlets+' ც.';
    if(len)s['სიგრძე']=len+' მ';
    s['სამუშ. ძაბვა']='250 V';
    s['მაქს. ტოკი']='16 A';
    s['სამუშ. სიმძლავრე']='3500 W';
    if(p.name.includes('USB'))s['USB']='Type A';
    if(p.name.includes('მეხდ.')||p.name.includes('surge'))s['მეხდაცვა']='✓ არის';
  }
  s['ბრენდი']=p.brand==='—'?'სხვა':p.brand;
  s['SKU']=p.sku;
  return s;
}

// ── TAB SWITCHING ─────────────────────────────────────────────
function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tab-pane').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-'+id).classList.add('on');
}

// ── WISHLIST ──────────────────────────────────────────────────
function toggleWish(id){
  const btn=document.getElementById('wish-btn');
  if(wish.has(id)){wish.delete(id);btn.innerHTML='🤍';btn.classList.remove('on')}
  else{wish.add(id);btn.innerHTML='❤️';btn.classList.add('on');showToast('რჩეულებში დაემატა ❤️')}
}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById('cbtn').addEventListener('click',openCart);
document.getElementById('cscl').addEventListener('click',closeCart);
document.getElementById('ov').addEventListener('click',closeCart);

// ── INIT ──────────────────────────────────────────────────────
const id=+new URLSearchParams(location.search).get('id');
const product=P.find(p=>p.id===id);
product?renderProduct(product):renderNotFound();
updateCart();
</script>
